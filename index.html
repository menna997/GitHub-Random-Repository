<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>GitHub Repository Finder</title>

    <link rel="stylesheet" href="./src/css/style.css" />
</head>

<body>

    <main class="repository">

        <!-- Header -->
        <header class="repository__header">
            <div class="repository__logo"></div>
            <h1 class="repository__title">GitHub Repository Finder</h1>
        </header>

        <!-- Language Select -->
        <select class="repository__select">
            <option value="" selected disabled>Select a language</option>
            <option value="javascript">JavaScript</option>
            <option value="python">Python</option>
            <option value="java">Java</option>
            <option value="typescript">TypeScript</option>
        </select>

        <!-- Empty State -->
        <section class="repository__message repository__message--empty">
            <p class="repository__message-text">
                Please select a language
            </p>
        </section>

        <!-- Loading State -->
        <section class="repository__message repository__message--loading">
            <p class="repository__message-text">
                Loading, please wait...
            </p>
        </section>

        <!-- Error State -->
        <div class="repository__error-container">

            <section class="repository__message repository__message--error">
                <p class="repository__message-text"></p>
            </section>

            <button class="repository__button repository__button--retry">
                Click to retry
            </button>

        </div>

        <!-- Repository Card -->
        <article class="repository__card">

            <h2 class="repository__card-title"></h2>

            <p class="repository__card-description"></p>

            <div class="repo-info">

                <div class="repository__info">

                    <span class="repository__language">
                        <i class="fa-solid fa-circle"></i>
                        <span class="repository__language-text"></span>
                    </span>

                    <span class="repository__info-item">
                        <i class="fa-solid fa-star"></i>
                        <span class="repository__stars"></span>
                    </span>

                    <span class="repository__info-item">
                        <i class="fa-solid fa-code-fork"></i>
                        <span class="repository__forks"></span>
                    </span>

                    <span class="repository__info-item">
                        <i class="fa-solid fa-circle-exclamation"></i>

                        <span class="repository__issues"></span>
                    </span>

                </div>

            </div>

        </article>

        <!-- Refresh Button -->
        <button class="repository__button repository__button--refresh">
            Refresh
        </button>

    </main>

    <script src="./src/js/script.js"></script>

</body>

</html>
